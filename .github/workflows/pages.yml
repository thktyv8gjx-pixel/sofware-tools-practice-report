name: Deploy Hexo to gh-pages Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Publish Hexo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Hexo dependencies
        run: |
          npm ls hexo-theme-landscape --depth=0
          npm ls hexo-renderer-stylus --depth=0

      - name: Adapt image paths for GitHub Pages
        run: python3 tools/fix-pages-paths.py

      - name: Build Hexo site
        run: |
          npx hexo clean
          npx hexo generate --config _config.yml,_config.github.yml

      - name: Verify generated files
        shell: bash
        run: |
          test -s public/index.html
          test -s public/css/style.css

          echo "CSS file:"
          ls -lh public/css/style.css

          echo "CSS reference:"
          grep -n "css/style.css" public/index.html

          echo "Generated file count:"
          find public -type f | wc -l

          touch public/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false