name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Hexo Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Hexo theme dependencies
        run: |
          npm ls hexo-theme-landscape --depth=0
          npm ls hexo-renderer-stylus --depth=0

      - name: Adapt image paths for GitHub Pages
        run: python3 tools/fix-pages-paths.py

      - name: Build Hexo site
        run: |
          npx hexo clean
          npx hexo generate --config _config.yml,_config.github.yml

      - name: Verify generated Hexo files
        shell: bash
        run: |
          echo "Checking Hexo output..."

          test -s public/index.html
          test -s public/css/style.css

          echo "Generated CSS file:"
          ls -lh public/css/style.css

          echo "CSS reference in homepage:"
          grep -n "css/style.css" public/index.html

          echo "Number of generated files:"
          find public -type f | wc -l

      - name: Prepare clean Pages directory
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy

          # 复制并解引用所有链接，形成独立的普通文件目录
          cp -rL public/. deploy/

          echo "Checking deployment directory..."

          test -s deploy/index.html
          test -s deploy/css/style.css

          echo "Deployment CSS file:"
          ls -lh deploy/css/style.css

          echo "CSS reference in deployment homepage:"
          grep -n "css/style.css" deploy/index.html

          echo "Checking symbolic links..."
          if find deploy -type l -print -quit | grep -q .; then
            echo "ERROR: Symbolic links still exist in deploy directory"
            find deploy -type l
            exit 1
          fi

          echo "Deployment file count:"
          find deploy -type f | wc -l

          # 禁止 GitHub Pages 使用 Jekyll 二次处理
          touch deploy/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./deploy
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4